name: Build ClashMI Unsigned IPA (For Windows Resign)

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      # 1. 拉取仓库代码（含子模块）
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 2. 安装适配的Flutter版本（核心：匹配Dart 3.9+）
      - name: Setup Flutter (Dart 3.9+)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'  # 该版本内置Dart 3.9+，匹配仓库要求
          channel: 'stable'
          # 禁用Flutter analytics（避免首次运行提示）
          cache: true

      # 3. 自动配置Xcode（使用Runner默认版本）
      - name: Auto Configure Xcode
        run: |
          # 查看可用Xcode版本
          ls -la /Applications/ | grep Xcode
          # 配置默认Xcode
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          # 验证Xcode和Dart版本
          xcodebuild -version
          dart --version
          flutter --version

      # 4. 安装Flutter + iOS依赖（适配版本要求）
      - name: Install All Dependencies
        run: |
          # 定位Flutter工程根目录
          FLUTTER_ROOT=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1 | xargs dirname)
          echo "✅ 找到Flutter根目录: $FLUTTER_ROOT"
          
          # 进入根目录，安装依赖（先禁用analytics避免交互）
          cd $FLUTTER_ROOT
          flutter config --no-analytics
          flutter pub get --verbose
          
          # 检查依赖是否安装成功
          if [ $? -ne 0 ]; then
            echo "❌ Flutter依赖安装失败，检查pubspec.yaml"
            cat pubspec.yaml | grep sdk
            exit 1
          fi
          
          # 进入iOS目录安装Pods
          cd ios
          pod install --verbose || echo "⚠️ CocoaPods安装跳过（无Podfile）"

      # 5. 编译Flutter iOS代码（无签名）
      - name: Build Flutter iOS (No Sign)
        run: |
          FLUTTER_ROOT=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1 | xargs dirname)
          cd $FLUTTER_ROOT
          # 编译iOS Release版（关闭签名，适配新版本Flutter）
          flutter build ios --release --no-codesign --verbose --ignore-version-check

      # 6. 打包未签名IPA（适配Runner工程）
      - name: Package Unsigned IPA
        run: |
          # 定位iOS工程目录
          IOS_DIR=$(find $GITHUB_WORKSPACE -name "Runner.xcworkspace" | head -n 1 | xargs dirname)
          echo "✅ 找到iOS工程目录: $IOS_DIR"
          cd $IOS_DIR
          
          # 定义变量
          SCHEME="Runner"
          CONFIG="Release"
          BUILD_DIR="./build"
          IPA_DIR="./ipa"
          ARCHIVE="$BUILD_DIR/ClashMI.xcarchive"
          
          # 创建目录
          mkdir -p $BUILD_DIR
          mkdir -p $IPA_DIR
          
          # Step 1: 生成xcarchive（禁用签名）
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme $SCHEME \
            -configuration $CONFIG \
            -archivePath $ARCHIVE \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            ONLY_ACTIVE_ARCH=NO

          # Step 2: 生成合法的ExportOptions.plist
          cat > "./ExportOptions.plist" << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>XXXXXX</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
            </dict>
            </plist>
            EOF
            
            # Step 3: 导出未签名IPA
            xcodebuild -exportArchive \
            -archivePath $ARCHIVE \
            -exportPath $IPA_DIR \
            -exportOptionsPlist "./ExportOptions.plist" \
            CODE_SIGNING_ALLOWED=NO
            
            # 重命名IPA并验证
            if [ -f "$IPA_DIR/Runner.ipa" ]; then
            mv "$IPA_DIR/Runner.ipa" "$IPA_DIR/ClashMI-Unsigned.ipa"
            echo "✅ IPA生成成功！文件路径：$IPA_DIR/ClashMI-Unsigned.ipa"
            ls -la $IPA_DIR
            else
            echo "❌ IPA文件未生成，检查Xcode打包日志"
            ls -la $IPA_DIR
            exit 1
            fi
          
      # 7. 上传IPA产物
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClashMI-Unsigned-IPA
          path: ${{ github.workspace }}/**/ipa/*.ipa
          retention-days: 30
