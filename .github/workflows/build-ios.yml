name: Build ClashMI Unsigned IPA (For Windows Resign)

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      # 1. 拉取代码（含子模块）
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 2. 安装Flutter环境（核心！Flutter工程必须先装Flutter）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      # 3. 选择Xcode版本
      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.0.app
          xcodebuild -version

      # 4. 定位iOS工程并安装依赖
      - name: Prepare iOS Dependencies
        run: |
          # 找到Flutter工程根目录（含pubspec.yaml）
          FLUTTER_ROOT=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1 | xargs dirname)
          cd $FLUTTER_ROOT
          
          # 安装Flutter依赖
          flutter pub get
          
          # 进入iOS目录安装CocoaPods依赖
          cd ios
          pod install --repo-update || echo "CocoaPods install skipped (no Podfile)"

      # 5. 编译Flutter iOS（生成原生代码，无签名）
      - name: Build Flutter iOS (No Sign)
        run: |
          FLUTTER_ROOT=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1 | xargs dirname)
          cd $FLUTTER_ROOT
          flutter build ios --release --no-codesign

      # 6. 打包未签名IPA（核心步骤，修复语法错误）
      - name: Build & Export Unsigned IPA
        run: |
          # 定位iOS工程目录
          IOS_DIR=$(find $GITHUB_WORKSPACE -name "Runner.xcworkspace" | head -n 1 | xargs dirname)
          cd $IOS_DIR
          
          # 配置参数
          SCHEME_NAME="Runner"
          CONFIGURATION="Release"
          BUILD_DIR="./build"
          IPA_DIR="./ipa"
          ARCHIVE_PATH="$BUILD_DIR/ClashMI.xcarchive"

          # 创建目录
          mkdir -p $BUILD_DIR
          mkdir -p $IPA_DIR

          # Step 1: 生成归档文件（完全禁用签名）
          xcodebuild archive \
            -workspace "Runner.xcworkspace" \
            -scheme "$SCHEME_NAME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO

          # Step 2: 生成合法的ExportOptions.plist（修复XML语法）
          cat > ./ExportOptions.plist <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>development</string>
    <key>signingStyle</key>
    <string>manual</string>
    <key>stripSwiftSymbols</key>
    <true/>
    <key>teamID</key>
    <string>XXXXXX</string>
    <key>compileBitcode</key>
    <false/>
    <key>uploadSymbols</key>
    <false/>
</dict>
</plist>
EOF

          # Step 3: 导出未签名IPA
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist ./ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

          # 重命名IPA（便于识别）
          mv $IPA_DIR/Runner.ipa $IPA_DIR/ClashMI-Unsigned.ipa || echo "IPA rename skipped"

      # 7. 上传IPA产物（修复路径语法）
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClashMI-Unsigned-IPA
          path: |
            **/ipa/*.ipa
          retention-days: 30
