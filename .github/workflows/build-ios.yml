name: Build ClashMI Unsigned IPA (For Windows Resign)

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      # 1. 拉取仓库代码（含子模块）
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 2. 安装Flutter环境（ClashMI是Flutter工程，必须）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      # 3. 自动检测并配置Xcode（核心修复：不再硬编码Xcode路径）
      - name: Auto Configure Xcode
        run: |
          # 列出当前可用的Xcode版本（避免硬编码路径错误）
          ls -la /Applications/ | grep Xcode
          # 使用系统默认的Xcode（GitHub Runner自带的最新版）
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          # 验证Xcode配置
          xcodebuild -version
          # 安装CocoaPods（适配Flutter iOS依赖）
          gem install cocoapods

      # 4. 安装Flutter + iOS依赖（适配官方仓库结构）
      - name: Install All Dependencies
        run: |
          # 定位Flutter工程根目录（pubspec.yaml所在）
          FLUTTER_ROOT=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1 | xargs dirname)
          echo "✅ 找到Flutter根目录: $FLUTTER_ROOT"
          
          # 安装Flutter依赖
          cd $FLUTTER_ROOT
          flutter pub get
          flutter doctor -v # 检查Flutter环境
          
          # 进入iOS目录安装Pods（官方工程ios子目录）
          cd ios
          pod install --verbose || echo "⚠️ CocoaPods安装跳过（无Podfile）"

      # 5. 编译Flutter iOS代码（生成原生工程，无签名）
      - name: Build Flutter iOS (No Sign)
        run: |
          FLUTTER_ROOT=$(find $GITHUB_WORKSPACE -name "pubspec.yaml" | head -n 1 | xargs dirname)
          cd $FLUTTER_ROOT
          # Flutter编译iOS Release版（关闭签名）
          flutter build ios --release --no-codesign --verbose

      # 6. 打包未签名IPA（适配Runner工程，无语法错误）
      - name: Package Unsigned IPA
        run: |
          # 定位iOS工程目录（Runner.xcworkspace）
          IOS_DIR=$(find $GITHUB_WORKSPACE -name "Runner.xcworkspace" | head -n 1 | xargs dirname)
          echo "✅ 找到iOS工程目录: $IOS_DIR"
          cd $IOS_DIR
          
          # 定义变量（避免硬编码）
          SCHEME="Runner"
          CONFIG="Release"
          BUILD_DIR="./build"
          IPA_DIR="./ipa"
          ARCHIVE="$BUILD_DIR/ClashMI.xcarchive"
          
          # 创建目录
          mkdir -p $BUILD_DIR
          mkdir -p $IPA_DIR
          
          # Step 1: 生成xcarchive（完全禁用签名）
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme $SCHEME \
            -configuration $CONFIG \
            -archivePath $ARCHIVE \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO
          
          # Step 2: 生成合法的ExportOptions.plist（无XML错误）
          cat > "./ExportOptions.plist" << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>XXXXXX</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
            </dict>
            </plist>
            EOF
            
            # Step 3: 导出未签名IPA
            xcodebuild -exportArchive \
            -archivePath $ARCHIVE \
            -exportPath $IPA_DIR \
            -exportOptionsPlist "./ExportOptions.plist" \
            CODE_SIGNING_ALLOWED=NO
            
            # 重命名IPA（便于识别）
            if [ -f "$IPA_DIR/Runner.ipa" ]; then
            mv "$IPA_DIR/Runner.ipa" "$IPA_DIR/ClashMI-Unsigned.ipa"
          echo "✅ IPA重命名成功: ClashMI-Unsigned.ipa"
            ls -la $IPA_DIR
            else
            echo "⚠️ IPA文件未找到，目录内容："
            ls -la $IPA_DIR
            fi

      # 7. 上传IPA产物（确保能下载）
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ClashMI-Unsigned-IPA
          path: ${{ github.workspace }}/**/ipa/*.ipa
          retention-days: 30
