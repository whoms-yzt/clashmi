# ClashMI (Flutter+Mihomo) iOS 编译工作流
name: Build ClashMI iOS IPA

on:
  workflow_dispatch:  # 仅手动触发

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      # 1. 拉取代码（含Flutter工程）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装Flutter环境（核心！Flutter工程必须先装Flutter）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'  # 适配主流Flutter版本
          channel: 'stable'

      # 3. 安装Xcode和CocoaPods
      - name: Setup Xcode & CocoaPods
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          xcodebuild -version
          # 安装CocoaPods依赖
          pod install --project-directory=$GITHUB_WORKSPACE

      # 4. 打印Flutter工程结构（确认路径）
      - name: Show Flutter Project Structure
        run: |
          echo "=== Flutter工程目录 ==="
          ls -la $GITHUB_WORKSPACE
          flutter doctor  # 检查Flutter环境

      # 5. 编译Flutter iOS工程为IPA（核心步骤）
      - name: Build Flutter iOS IPA (Mihomo内核)
        run: |
          cd $GITHUB_WORKSPACE
          
          # 第一步：Flutter打包为Release模式（生成iOS原生工程）
          flutter build ios --release --no-codesign
          
          # 第二步：用Xcode打包IPA（适配Runner工程）
          # Flutter编译后的工程在ios目录（这里仓库根目录就是ios工程）
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ./ClashMI.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          # 第三步：导出未签名IPA
          mkdir -p ./IPA
          xcodebuild -exportArchive \
            -archivePath ./ClashMI.xcarchive \
            -exportPath ./IPA \
            -exportOptionsPlist <(cat <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
          )
          
          # 重命名IPA为ClashMI.ipa（方便识别）
          mv ./IPA/Runner.ipa ./IPA/ClashMI.ipa
          
          # 确认IPA生成成功
          if [ -f "./IPA/ClashMI.ipa" ]; then
            echo "✅ IPA生成成功！路径：./IPA/ClashMI.ipa"
            ls -la ./IPA
          else
            echo "❌ IPA生成失败！"
            exit 1
          fi

      # 6. 上传IPA到Releases
      - name: Upload IPA to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: clashmi-ios-${{ github.run_id }}
          name: ClashMI iOS Build ${{ github.run_id }}
          files: ./IPA/ClashMI.ipa
          body: |
            🚀 ClashMI (Flutter+Mihomo内核) iOS IPA包
            - 基于KaringX/clashmi Flutter工程编译
            - 内置Mihomo(Clash.Meta)内核
            - 未签名，需用Apple ID重签后安装
        if: success()
