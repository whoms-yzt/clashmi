# ClashMI (Mihomo内核) iOS 编译工作流
name: Build ClashMI iOS IPA

# 仅手动触发（避免代码推送自动编译）
on:
  workflow_dispatch:

# 权限配置
permissions:
  contents: write

jobs:
  build-ios:
    # 必须使用macOS云环境打包iOS
    runs-on: macos-14
    steps:
      # 1. 拉取仓库代码（含内置Mihomo内核）
      - name: Checkout ClashMI code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 拉取所有子模块（内置内核依赖）

      # 2. 安装Xcode环境（核心依赖）
      - name: Setup Xcode
        run: |
          # 安装Xcode 15.2（适配iOS打包）
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          # 确认Xcode版本
          xcodebuild -version
          # 安装必要的证书依赖（关闭强制签名）
          security unlock-keychain -p "" /Users/runner/Library/Keychains/login.keychain-db

      # 3. 打印目录结构（调试用，可确认iOS工程路径）
      - name: Show Project Structure
        run: |
          echo "=== 仓库根目录 ==="
          ls -la $GITHUB_WORKSPACE
          echo "=== iOS工程目录 ==="
          ls -la $GITHUB_WORKSPACE/ios || ls -la $GITHUB_WORKSPACE/ClashMI || echo "无iOS目录"

      # 4. 打包ClashMI iOS工程（核心步骤，适配内置Mihomo内核）
      - name: Build ClashMI IPA (Mihomo Kernel)
        run: |
          # 定义iOS工程路径（适配ClashMI的常见路径）
          PROJ_DIR=""
          SCHEME_NAME="ClashMI"  # 适配仓库的Scheme名称

          # 自动检测工程文件（xcodeproj/xcworkspace）
          if [ -d "$GITHUB_WORKSPACE/ios" ]; then
            PROJ_DIR="$GITHUB_WORKSPACE/ios"
          elif [ -d "$GITHUB_WORKSPACE/ClashMI" ]; then
            PROJ_DIR="$GITHUB_WORKSPACE/ClashMI"
          else
            PROJ_DIR="$GITHUB_WORKSPACE"
          fi

          # 优先找xcworkspace，没有则找xcodeproj
          PROJ_FILE=""
          if [ -f "$PROJ_DIR/ClashMI.xcworkspace" ]; then
            PROJ_FILE="$PROJ_DIR/ClashMI.xcworkspace"
            BUILD_CMD="xcodebuild -workspace"
          elif [ -f "$PROJ_DIR/ClashMI.xcodeproj" ]; then
            PROJ_FILE="$PROJ_DIR/ClashMI.xcodeproj"
            BUILD_CMD="xcodebuild -project"
          else
            echo "❌ 未找到ClashMI iOS工程文件！"
            ls -la $PROJ_DIR
            exit 1
          fi

          echo "✅ 找到iOS工程：$PROJ_FILE"

          # 清理旧构建产物
          $BUILD_CMD "$PROJ_FILE" -scheme $SCHEME_NAME -configuration Release clean

          # 打包Archive（关闭强制签名，生成未签名包）
          $BUILD_CMD "$PROJ_FILE" \
            -scheme $SCHEME_NAME \
            -configuration Release \
            -archivePath $GITHUB_WORKSPACE/ClashMI.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_LIBRARIES_FOR_DISTRIBUTION=YES

          # 导出IPA包（无签名，后续可自签）
          mkdir -p $GITHUB_WORKSPACE/IPA
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/ClashMI.xcarchive \
            -exportPath $GITHUB_WORKSPACE/IPA \
            -exportOptionsPlist <(cat <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
          )

          # 确认IPA生成成功
          if [ -f "$GITHUB_WORKSPACE/IPA/ClashMI.ipa" ]; then
            echo "✅ IPA包生成成功！路径：$GITHUB_WORKSPACE/IPA/ClashMI.ipa"
            ls -la $GITHUB_WORKSPACE/IPA
          else
            echo "❌ IPA包生成失败！"
            exit 1
          fi

      # 5. 上传IPA到GitHub Releases（方便下载）
      - name: Upload IPA to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: clashmi-ios-${{ github.run_id }}
          name: ClashMI iOS Build ${{ github.run_id }}
          files: $GITHUB_WORKSPACE/IPA/ClashMI.ipa
          body: |
            🚀 ClashMI (Mihomo内核) iOS IPA包
            - 基于KaringX/clashmi仓库自动编译
            - 内置最新Mihomo(Clash.Meta)内核
            - 未签名，需用Apple ID重签后安装
            - 官网：clashmi.app
        if: success()
